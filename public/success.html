<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Result</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 32px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }

    a {
      display: inline-block;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Payment Result</h1>
    <p>This page is used when Stripe redirects back after payment confirmation.</p>

    <pre id="result">Loading...</pre>

    <a href="/">Back to checkout</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("orderId");

    async function getOrder() {
      if (!orderId) {
        document.getElementById("result").textContent = "Missing orderId";
        return;
      }

      const response = await fetch(`/api/orders/${orderId}`);
      const result = await response.json();

      document.getElementById("result").textContent = JSON.stringify({
        stripeRedirectParams: Object.fromEntries(params.entries()),
        localOrder: result.data || result
      }, null, 2);
    }

    getOrder();
  </script>
</body>
</html>
